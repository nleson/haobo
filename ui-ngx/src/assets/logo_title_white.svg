<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" width="1100" height="320">
  <defs>
    <linearGradient id="achGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Logo block (left side) -->
  <g transform="translate(0,0)">
    <rect x="32" y="32" width="256" height="256" rx="56" ry="56" fill="url(#achGrad2)"/>
    <g fill="#ffffff">
      <path d="M 160 78
               L 256 248
               L 218 248
               L 198 208
               L 122 208
               L 102 248
               L 64 248
               Z" />
      <rect x="118" y="178" width="84" height="14" rx="4" fill="#ffffff"/>
      <circle cx="252" cy="100" r="14" fill="#ffffff"/>
    </g>
    <text x="160" y="284"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="36"
          font-weight="700"
          letter-spacing="6"
          text-anchor="middle"
          fill="#ffffff">ACH</text>
  </g>

  <!-- Brand text (right side) -->
  <g transform="translate(340, 0)">
    <!-- Chinese name 浩博百星 -->
    <text x="0" y="180"
          font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif"
          font-size="88"
          font-weight="700"
          fill="#1e3a8a"
          letter-spacing="6">浩博百星</text>

    <!-- English subtitle -->
    <text x="2" y="232"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="26"
          font-weight="400"
          fill="#3b82f6"
          letter-spacing="8">HAOBO · SMART SCENE</text>

    <!-- Decorative underline -->
    <line x1="2" y1="252" x2="500" y2="252" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
  </g>
</svg>