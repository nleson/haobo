<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="achGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="256" height="256" rx="56" ry="56" fill="url(#achGrad)"/>

  <!-- "A" letterform (geometric, with cutout for ACH crossbar) -->
  <g fill="#ffffff">
    <!-- Outer A triangle, hollowed by inner triangle -->
    <path d="M 160 78
             L 256 248
             L 218 248
             L 198 208
             L 122 208
             L 102 248
             L 64 248
             Z" />

    <!-- Crossbar of A (slight separation gives modern feel) -->
    <rect x="118" y="178" width="84" height="14" rx="4" fill="#ffffff"/>

    <!-- Small accent dot to the right (suggests 'i' or signal/connect) -->
    <circle cx="252" cy="100" r="14" fill="#ffffff"/>
  </g>

  <!-- ACH text under the A inside the rounded square -->
  <text x="160" y="284"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="36"
        font-weight="700"
        letter-spacing="6"
        text-anchor="middle"
        fill="#ffffff">ACH</text>
</svg>